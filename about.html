    <style>
        /* RESET & BASE */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
            background-color: #0b0b0f;
            color: #e0e0e0;
        }
        body {
            font-family: 'Inter', 'Noto Sans KR', system-ui, -apple-system, sans-serif;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* TYPOGRAPHY */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: #f0f0f5;
        }
        h1 {
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
        }
        h2 {
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            border-left: 6px solid #00ffc8;
            padding-left: 1rem;
            margin-bottom: 1.6rem;
        }
        h3 {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            margin-bottom: 0.8rem;
            color: #c0ffed;
        }
        p, li, blockquote {
            font-size: 1rem;
            margin-bottom: 1.2rem;
            color: #c8c8d0;
        }
        a {
            color: #00ffc8;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }
        a:hover, a:focus {
            border-bottom-color: #00ffc8;
            color: #66ffdd;
        }
        strong {
            color: #ffffff;
            font-weight: 700;
        }

        /* UTILITY */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .section-gap {
            padding: 4rem 0;
        }
        .full-bleed {
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            position: relative;
        }

        /* NAVIGATION */
        nav {
            background: #0d0d14;
            border-bottom: 2px solid #1f1f2e;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.7);
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #00ffc8;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: none;
        }
        .nav-logo:hover {
            border: none;
            color: #66ffdd;
        }
        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: #b0b0c0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: none;
            padding: 0.3rem 0;
        }
        .nav-links a:hover {
            color: #00ffc8;
        }
        .nav-links a.active {
            color: #00ffc8;
            border-bottom: 2px solid #00ffc8;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
            padding: 0.3rem;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: #c8c8d0;
            border-radius: 2px;
            transition: 0.3s;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #0d0d14;
                padding: 1.5rem;
                gap: 1.2rem;
                border-bottom: 2px solid #1f1f2e;
            }
            .nav-links.open {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
        }

        /* CARD & LIST GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
        }
        .card {
            background: #12121c;
            border: 1px solid #1f1f2e;
            padding: 1.8rem;
            border-radius: 4px;
            transition: border-color 0.3s, transform 0.2s;
        }
        .card:hover {
            border-color: #00ffc8;
            transform: translateY(-4px);
        }
        .card h3 {
            border-bottom: 2px solid #1f1f2e;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .card .meta {
            font-size: 0.85rem;
            color: #808090;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .card .rating {
            color: #ffd700;
            font-weight: 700;
        }
        .card p {
            font-size: 0.95rem;
            margin-bottom: 0.6rem;
        }
        .card .tel-link {
            display: inline-block;
            background: #00ffc8;
            color: #0b0b0f;
            padding: 0.3rem 1rem;
            border-radius: 2px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            transition: background 0.2s;
        }
        .card .tel-link:hover {
            background: #66ffdd;
            border: none;
        }

        /* FAQ */
        .faq-item {
            border-bottom: 1px solid #1f1f2e;
            padding: 1.2rem 0;
        }
        .faq-item:last-child {
            border-bottom: none;
        }
        .faq-question {
            font-weight: 700;
            font-size: 1.05rem;
            color: #e0e0e8;
            cursor: default;
            margin-bottom: 0.4rem;
        }
        .faq-answer {
            color: #b0b0c0;
            font-size: 0.95rem;
            padding-left: 0.5rem;
        }

        /* HERO */
        .hero {
            background: radial-gradient(ellipse at 30% 20%, #0f1a1a, #0b0b0f);
            padding: 5rem 0 4rem;
            border-bottom: 2px solid #1f1f2e;
        }
        .hero h1 {
            margin-bottom: 0.8rem;
        }
        .hero p {
            font-size: 1.1rem;
            max-width: 720px;
            color: #b0b0c0;
        }

        /* BLOCKQUOTE / HIGHLIGHT */
        blockquote {
            border-left: 4px solid #00ffc8;
            padding: 1rem 1.5rem;
            background: #0e0e18;
            font-style: normal;
            margin: 2rem 0;
        }

        /* FOOTER */
        footer {
            background: #0a0a10;
            border-top: 2px solid #1f1f2e;
            padding: 2.5rem 0;
            margin-top: auto;
            text-align: center;
            font-size: 0.85rem;
            color: #606070;
        }
        footer a {
            color: #808090;
        }

        /* TEL BUTTON GLOBAL */
        .tel-link {
            white-space: nowrap;
        }
    </style>
</head>

                <span></span>

    <main>
        <section class="hero">
            <div class="container">

                <p>2025년 기준 등촌 지역 유흥업소의 종합 데이터. 업소별 평점, 운영 시간, 실제 방문자 피드백을 바탕으로 한 신뢰도 높은 분석 결과를 제공합니다. 등촌 밤문화를 정확히 이해하고 싶다면 이 페이지가 출발점입니다.</p>
            </div>

</body>
</html>
